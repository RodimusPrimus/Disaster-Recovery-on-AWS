AWSTemplateFormatVersion: '2010-09-09'\nDescription: CloudFormation template for AWS Application Migration Service (MGN) replication infrastructure.\n\nResources:  \n  ReplicationServer:  \n    Type: 'AWS::EC2::Instance'  \n    Properties:  \n      InstanceType: 't2.micro'  \n      ImageId: 'ami-0c55b159cbfafe01a'  \n      KeyName: 'your-key-name'  \n      SubnetId: 'your-subnet-id'  \n      SecurityGroupIds:  \n        - 'your-security-group-id'  \n      UserData:  \n        Fn::Base64:  \n          'Fn::Sub':  \n            - |  \n              #!/bin/bash  \n              yum update -y  \n              # Additional customization can go here  \n              \n            - {}  \n\n  ReplicationGroup:  \n    Type: 'AWS::SMS::ReplicationGroup'  \n    Properties:  \n      ReplicationServerInstanceId:  \n        Ref: ReplicationServer  \n      ClientId: 'your-client-id'  \n      ReplicationGroupName: 'YourReplicationGroupName'  \n