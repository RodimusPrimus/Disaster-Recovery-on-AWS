AWSTemplateFormatVersion: '2010-09-09'\nDescription: AWS CloudFormation Template for VPC setup in us-east-1 region for Disaster Recovery Site\n\nParameters:\n  VpcCIDR:\n    Type: String\n    Default: '10.0.0.0/16'\n    Description: CIDR block for the VPC\n\nResources:\n  MyVPC:\n    Type: 'AWS::EC2::VPC'\n    Properties:\n      CidrBlock: !Ref VpcCIDR\n      EnableDnsSupport: true\n      EnableDnsHostnames: true\n      Tags:\n        - Key: Name\n          Value: DisasterRecoveryVPC\n\n  PublicSubnet:\n    Type: 'AWS::EC2::Subnet'\n    Properties:\n      VpcId: !Ref MyVPC\n      CidrBlock: '10.0.1.0/24'\n      AvailabilityZone: !Select [ 0, !GetAZs 'us-east-1' ]\n      MapPublicIpOnLaunch: true\n      Tags:\n        - Key: Name\n          Value: PublicSubnet\n\n  PrivateSubnet:\n    Type: 'AWS::EC2::Subnet'\n    Properties:\n      VpcId: !Ref MyVPC\n      CidrBlock: '10.0.2.0/24'\n      AvailabilityZone: !Select [ 0, !GetAZs 'us-east-1' ]\n      Tags:\n        - Key: Name\n          Value: PrivateSubnet\n\n  InternetGateway:\n    Type: AWS::EC2::InternetGateway\n    Properties:\n      Tags:\n        - Key: Name\n          Value: DisasterRecoveryIGW\n\n  AttachInternetGateway:\n    Type: AWS::EC2::VPCGatewayAttachment\n    Properties:\n      VpcId: !Ref MyVPC\n      InternetGatewayId: !Ref InternetGateway\n\nOutputs:\n  VpcId:\n    Description: The VPC Id\n    Value: !Ref MyVPC\n  PublicSubnetId:\n    Description: The Public Subnet Id\n    Value: !Ref PublicSubnet\n  PrivateSubnetId:\n    Description: The Private Subnet Id\n    Value: !Ref PrivateSubnet\n